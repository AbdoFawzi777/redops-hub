name: redops_hub
description: RedOps Hub - Mobile Command Center for Red Team Operations
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  firebase_core: ^3.10.1
  firebase_auth: ^5.4.4
  firebase_app_check: ^0.3.1
  google_sign_in: ^6.2.1

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  go_router: ^13.2.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^10.3.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  local_auth: ^2.3.0
  dio: ^5.4.3
  web_socket_channel: ^3.0.3
  connectivity_plus: ^6.0.1
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  shimmer: ^3.0.0
  uuid: ^4.4.0
  intl: ^0.20.2
  logger: ^2.3.0
  freezed_annotation: ^2.4.2
  json_annotation: ^4.9.0
  path_provider: ^2.1.3



  permission_handler: ^11.3.1
  speech_to_text: ^7.0.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.10
  safe_device: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  riverpod_generator: ^2.4.0

  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon_logo.jpg"
  adaptive_icon_background: "#04041C"
  adaptive_icon_foreground: "assets/icons/icon_logo.jpg"
flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/payloads/web/
    - assets/payloads/active_directory/
    - assets/payloads/privilege_escalation/
    - assets/payloads/network/
